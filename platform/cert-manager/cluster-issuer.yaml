apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: admin@cloud-factory.co
    privateKeySecretRef:
      name: letsencrypt-prod-account-key
    solvers:
      - dns01:
          route53:
            region: eu-west-1
            accessKeyIDSecretRef:
              name: route53-credentials
              key: access-key-id
            secretAccessKeySecretRef:
              name: route53-credentials
              key: secret-access-key
        selector:
          dnsZones:
            - "cloud-factory.co"
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: wildcard-kube-cloud-factory
  namespace: cert-manager
spec:
  secretName: wildcard-kube-cloud-factory-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - "kube.cloud-factory.co"
    - "*.kube.cloud-factory.co"
