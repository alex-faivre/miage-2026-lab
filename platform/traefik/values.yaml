deployment:
  replicas: 2

service:
  type: NodePort

ports:
  web:
    port: 8000
    exposedPort: 80
    nodePort: 30080
  websecure:
    port: 8443
    exposedPort: 443
    nodePort: 30443

ingressRoute:
  dashboard:
    enabled: false

providers:
  kubernetesGateway:
    enabled: true
  kubernetesCRD:
    enabled: true
    allowCrossNamespace: true
  kubernetesIngress:
    enabled: true

additionalArguments:
  - "--entryPoints.websecure.http.tls=true"

resources:
  requests:
    cpu: 100m
    memory: 64Mi
  limits:
    memory: 256Mi

logs:
  general:
    level: INFO
